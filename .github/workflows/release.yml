name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release zip
        run: |
          ZIP_NAME="pi-v${{ steps.version.outputs.VERSION }}.zip"
          zip -r "$ZIP_NAME" \
            .claude-plugin/ \
            skills/ \
            claude-code/ \
            copilot-cli/ \
            cursor/ \
            kiro/ \
            openclaw/ \
            agents/ \
            commands/ \
            hooks/ \
            install.sh \
            SKILL.md \
            LICENSE \
            README.md \
            README.en.md \
            -x '*.DS_Store'
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
