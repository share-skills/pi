training:
  # Model
  model_name: Qwen/Qwen2-7B
  trust_remote_code: true

  # Dataset — hardcoded paths (see config_builder.py BUG)
  dataset_path: /data/guwen/training_v2.jsonl
  eval_dataset_path: /data/guwen/eval_v2.jsonl
  max_seq_length: 2048
  dataset_text_field: text

  # LoRA
  lora_r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  lora_target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj

  # Training
  num_epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: cosine
  max_grad_norm: 1.0

  # Precision
  bf16: true
  fp16: false
  quantization: "4bit"

  # Checkpointing
  output_dir: ./outputs/guwen-llm
  save_steps: 500
  save_total_limit: 3
  logging_steps: 10
  eval_steps: 500

  # Misc
  seed: 42
  gradient_checkpointing: true
  report_to: tensorboard
  push_to_hub: false
