version: '3.8'

services:
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - milvus_etcd:/etcd
    command: >
      etcd
      --advertise-client-urls=http://127.0.0.1:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-13T19-46-17Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - milvus_minio:/minio_data
    command: minio server /minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.3.3
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      # NOTE: Host port is 19531 but container port is 19530.
      # The RAG config defaults to 19530 — this WILL cause connection failures.
      # Fix: set milvus_port: 19531 in rag_config.yaml
      - "19531:19530"   # <-- Intentional port mismatch for Scenario 3
      - "9091:9091"
    depends_on:
      - milvus-etcd
      - milvus-minio

  inference-api:
    build: .
    command: python -m src.inference.api_server --config configs/inference_config.yaml
    ports:
      - "8000:8000"
    environment:
      GUWEN_API_KEY: ${GUWEN_API_KEY:-sk-guwen-default-key-2024}
    depends_on:
      - vllm

  vllm:
    image: vllm/vllm-openai:latest
    command: >
      --model /models/guwen-llm-7b-chat
      --port 8001
      --dtype auto
    ports:
      - "8001:8001"
    volumes:
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  milvus_etcd:
  milvus_minio:
  milvus_data:
